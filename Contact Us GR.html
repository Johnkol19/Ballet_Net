            .my-pink-input {
                background-color: rgba(220, 143, 143, 0.8);
                padding: 20px;
                border-radius: 10px;
                width: 95%;
                margin: 20px auto;
                box-shadow: 0 4px 8px rgba(224, 170, 170, 0.1);}
            .text-link {
                color: #eeb2ba;
                text-decoration: none; 
                font-family: 'Lucida Sans', sans-serif;
                font-weight: bold;
                transition: color 0.3s;
            }
            .text-link:hover {
                color: #5d575d;          
                text-decoration: underline;
      }
        </style>
    </head>

    <body>
        <nav class="navbar navbar-light bg-light mb-4 shadow-sm">

                    <select class="form-select pink-border" id="languageSelect" onchange="location = this.value;">

                    </div>
                </a>

        </nav>  
        <audio id="myAudio" loop>
            <source src="Abba - Money, Money, Money (Official Music Video).mp3" type="audio/mpeg">
        </audio>
        <button id="mute-toggle">🔈 Tap x3 </button>
        <script>
            const audio = document.getElementById("myAudio");
            const btn = document.getElementById("mute-toggle");
            btn.addEventListener("click", function() {
                if (audio.paused) {
                    audio.play();
                    audio.muted = false;
                    btn.textContent = "🔊"; 
                } else {
                    if (audio.muted) {
                        audio.muted = false;
                        btn.textContent = "🔊";
                    } else {
                        audio.muted = true;
                        btn.textContent = "🔇"; 
                    }
               }
            });
        </script>
        <table class="my-table">

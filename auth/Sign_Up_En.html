<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Sign Up - Ballet Net</title>
    <link rel="icon" type="image/png" href="../photos/BalletArts.png">
    <link rel="stylesheet" type="text/css"
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link
        href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600&family=Playfair+Display:ital,wght@0,600;0,700;1,600&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" type="text/css" href="../css/background_style.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body class="d-flex flex-column min-vh-100">

    <nav class="navbar navbar-light bg-light mb-4 shadow-sm py-2">
        <div class="container-fluid d-flex justify-content-between align-items-center px-4 px-lg-5">
            <a class="navbar-brand fs-2 fw-bold d-flex align-items-center text-ballet" href="../Landing_Page.html">
                <img src="../photos/BalletArts.png" alt="Ballet Arts Logo" height="80" class="me-3"> Ballet Net
            </a>
            <div class="d-flex gap-4 align-items-center d-none d-lg-flex">
                <a href="../Landing_Page.html" class="text-link"> Landing Page </a>
                <a href="Sign_Up_GR.html" class="btn btn-outline-ballet btn-sm rounded-pill px-3 fw-bold">Ελληνικά
                    🇬🇷</a>
            </div>
        </div>
    </nav>

    <div class="container flex-grow-1 d-flex justify-content-center align-items-center mb-5 mt-3">
        <div class="card shadow-lg border-0 rounded-4 w-100" style="max-width: 500px; overflow: hidden;">
            <div class="card-header bg-ballet text-center fw-bold fs-3 py-4 border-0">Sign Up</div>
            <div class="card-body p-5 bg-white">
                <form id="signupForm" action="/register-endpoint" method="POST">
                    <div class="mb-4">
                        <label class="form-label text-secondary small fw-bold text-uppercase">Username</label>
                        <input type="text" id="username" class="form-control border-2 p-3 rounded-3"
                            placeholder="Enter username" required>
                    </div>
                    <div class="mb-4">
                        <label class="form-label text-secondary small fw-bold text-uppercase">Password</label>
                        <input type="password" id="passwordMain" class="form-control border-2 p-3 rounded-3"
                            placeholder="Enter password" required>
                    </div>
                    <div class="mb-4">
                        <label class="form-label text-secondary small fw-bold text-uppercase">Confirm Password</label>
                        <input type="password" id="passwordConfirm" class="form-control border-2 p-3 rounded-3"
                            placeholder="Confirm password" required>
                    </div>
                    <div class="d-grid pt-2">
                        <button type="submit" id="submitBtn"
                            class="btn btn-ballet btn-lg fw-bold shadow-sm rounded-pill py-3">Create Account</button>
                    </div>
                </form>
            </div>
            <div class="card-footer bg-light border-0 text-center py-4">
                <a href="Log_In_En.html" class="text-link mx-2">Log In</a> |
                <a href="Contact_Us_En.html" class="text-link mx-2">Contact Us</a> |
                <a href="Forgot_Email_En.html" class="text-link mx-2">Forgot Password?</a>
            </div>
        </div>
    </div>

    <div class="modal fade" id="passwordErrorModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content shadow-lg border-0 rounded-4 overflow-hidden">
                <div class="modal-header bg-ballet text-white border-0 p-4">
                    <h5 class="modal-title fw-bold">Ballet Net Security</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body fs-5 text-center py-5">
                    <i class="bi bi-exclamation-triangle text-danger fs-1 d-block mb-3"></i>
                    The passwords you entered do not match.
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        document.addEventListener("DOMContentLoaded", function () {
            const form = document.getElementById("signupForm");
            const p2 = document.getElementById("passwordMain");
            const p3 = document.getElementById("passwordConfirm");

            // Ακούμε το event της υποβολής (submit) της φόρμας
            form.addEventListener("submit", function (e) {
                
                // Ελέγχουμε αν οι κωδικοί ΔΕΝ ταιριάζουν
                if (p2.value !== p3.value) {
                    // Σταματάμε την υποβολή της σελίδας
                    e.preventDefault(); 
                    
                    // Εμφανίζουμε το Modal του Bootstrap
                    new bootstrap.Modal(document.getElementById("passwordErrorModal")).show(); 
                    
                    // Αδειάζουμε το πεδίο επιβεβαίωσης για να το ξαναγράψει ο χρήστης
                    p3.value = ""; 
                }
                // Αν οι κωδικοί ταιριάζουν, η JavaScript δεν κάνει τίποτα και η φόρμα υποβάλλεται κανονικά.
            });
        });
    </script>
</body>

</html>

<!DOCTYPE html>
<html lang="el">

<head>
    <meta charset="UTF-8">
    <title>Εγγραφή - Ballet Net</title>
    <link rel="icon" type="image/png" href="../photos/BalletArts.png">
    <link rel="stylesheet" type="text/css"
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link
        href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600&family=Playfair+Display:ital,wght@0,600;0,700;1,600&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" type="text/css" href="../css/background_style.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body class="d-flex flex-column min-vh-100">

    <nav class="navbar navbar-expand-lg navbar-light bg-light mb-4 shadow-sm py-2">
        <div class="container-fluid px-4 px-lg-5">
        <!-- Logo -->
            <a class="navbar-brand fs-2 fw-bold d-flex align-items-center text-ballet" href="../index.html">
                <img src="../photos/BalletArts.png" alt="Ballet Arts Logo" height="80" class="me-3"> Ballet Net
            </a>

        <!-- Hamburger Button for Mobile -->
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>

        <!-- Collapsible Links -->
            <div class="collapse navbar-collapse justify-content-end" id="navbarNav">
                <div class="d-flex flex-column flex-lg-row gap-3 align-items-center mt-3 mt-lg-0">
                    <a href="../index.html" class="text-link"> Landing Page </a>
                    <a href="Sign_Up_GR.html" class="btn btn-outline-ballet btn-sm rounded-pill px-3 fw-bold">Ελληνικά 🇬🇷</a>
                </div>
            </div>
        </div>
    </nav>

    <div class="container flex-grow-1 d-flex justify-content-center align-items-center mb-5 mt-3">
        <div class="card shadow-lg border-0 rounded-4 w-100" style="max-width: 500px; overflow: hidden;">
            <div class="card-header bg-ballet text-center fw-bold fs-3 py-4 border-0">Εγγραφή</div>
            <div class="card-body p-5 bg-white">
                <form id="signupForm" action="/register-endpoint" method="POST">
                    <div class="mb-4">
                        <label class="form-label text-secondary small fw-bold text-uppercase">Όνομα Χρήστη</label>
                        <input type="text" id="username" class="form-control border-2 p-3 rounded-3"
                            placeholder="Εισάγετε όνομα χρήστη" required>
                    </div>
                    <div class="mb-4">
                        <label class="form-label text-secondary small fw-bold text-uppercase">Κωδικός</label>
                        <input type="password" id="passwordMain" class="form-control border-2 p-3 rounded-3"
                            placeholder="Εισάγετε κωδικό" required>
                    </div>
                    <div class="mb-4">
                        <label class="form-label text-secondary small fw-bold text-uppercase">Επανάληψη Κωδικού</label>
                        <input type="password" id="passwordConfirm" class="form-control border-2 p-3 rounded-3"
                            placeholder="Επιβεβαιώστε τον κωδικό" required>
                    </div>
                    <div class="d-grid pt-2">
                        <button type="submit" id="submitBtn"
                            class="btn btn-ballet btn-lg fw-bold shadow-sm rounded-pill py-3">Δημιουργία
                            Λογαριασμού</button>
                    </div>
                </form>
                
            </div>
            <div class="card-footer bg-light border-0 text-center py-4">
                <a href="Log_In_GR.html" class="text-link mx-2">Σύνδεση</a> |
                <a href="Contact_Us_GR.html" class="text-link mx-2">Επικοινωνία</a> |
                <a href="Forgot_Email_GR.html" class="text-link mx-2">Ξεχάσατε τον κωδικό;</a>
            </div>
        </div>
    </div>

    <div class="modal fade" id="passwordErrorModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content shadow-lg border-0 rounded-4 overflow-hidden">
                <div class="modal-header bg-ballet text-white border-0 p-4">
                    <h5 class="modal-title fw-bold">Ballet Net Security</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body fs-5 text-center py-5">
                    <i class="bi bi-exclamation-triangle text-danger fs-1 d-block mb-3"></i>
                    Ο κωδικός που εισάγατε δεν ταιριάζει. Παρακαλώ δοκιμάστε ξανά.
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        document.addEventListener("DOMContentLoaded", function () {
            const form = document.getElementById("signupForm");
            const p2 = document.getElementById("passwordMain");
            const p3 = document.getElementById("passwordConfirm");

            form.addEventListener("submit", function (e) {
                // Ελέγχουμε αν οι κωδικοί ΔΕΝ ταιριάζουν
                if (p2.value !== p3.value) {
                    // Σταματάμε την υποβολή της σελίδας
                    e.preventDefault(); 
                    
                    // Εμφανίζουμε το Modal
                    new bootstrap.Modal(document.getElementById("passwordErrorModal")).show(); 
                    
                    // Αδειάζουμε το πεδίο επιβεβαίωσης
                    p3.value = ""; 
                }
            });
        });
    </script>
</body>

</html>

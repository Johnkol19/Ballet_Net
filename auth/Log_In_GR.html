    <link rel="stylesheet" type="text/css" href="../css/background_style.css">

</head>

<body class="d-flex flex-column min-vh-100">

    <nav class="navbar navbar-light bg-light mb-4 shadow-sm py-2">
        <div class="container-fluid d-flex justify-content-between align-items-center px-4 px-lg-5">
            <a class="navbar-brand fs-2 fw-bold d-flex align-items-center text-ballet" href="../Landing_Page.html">

            <div class="d-flex gap-4 align-items-center d-none d-lg-flex">

                <a href="Manage_Schedule.html" class="text-link"> Manage Schedule </a>

                <a href="Log_In_En.html" class="btn btn-outline-ballet btn-sm rounded-pill px-3 fw-bold">English
                    馃彺鬆仹鬆仮鬆仴鬆伄鬆仹鬆伩</a>
            </div>
        </div>
    </nav>

    <div class="container flex-grow-1 d-flex justify-content-center align-items-center mb-5 mt-3">
        <div class="card shadow-lg border-0 rounded-4 w-100" style="max-width: 500px; overflow: hidden;">
            <div class="card-header bg-ballet text-center fw-bold fs-3 py-4 border-0">螘委蟽慰未慰蟼</div>
            <div class="card-body p-5 bg-white">
                <div class="mb-4">
                    <label class="form-label text-secondary small fw-bold text-uppercase">螌谓慰渭伪 围蟻萎蟽蟿畏</label>
                    <input type="text" id="username" class="form-control border-2 p-3 rounded-3"
                        placeholder="螘喂蟽维纬蔚蟿蔚 蠈谓慰渭伪 蠂蟻萎蟽蟿畏">
                </div>
                <div class="mb-4">
                    <label class="form-label text-secondary small fw-bold text-uppercase">螝蠅未喂魏蠈蟼</label>
                    <input type="password" id="password" class="form-control border-2 p-3 rounded-3"
                        placeholder="螘喂蟽维纬蔚蟿蔚 魏蠅未喂魏蠈">
                </div>
                <div class="form-check mb-4">
                    <input class="form-check-input" type="checkbox" id="rememberMe">
                    <label class="form-check-label text-muted" for="rememberMe">螡伪 渭蔚 胃蠀渭维蟽伪喂</label>
                </div>
                <div class="d-grid pt-2">
                    <button type="button" id="submitBtn"
                        class="btn btn-ballet btn-lg fw-bold shadow-sm rounded-pill py-3">危蠉谓未蔚蟽畏</button>
                </div>
            </div>
            <div class="card-footer bg-light border-0 text-center py-4">
                <a href="Sign_Up_GR.html" class="text-link mx-2">螘纬纬蟻伪蠁萎</a> |
                <a href="Contact_Us_GR.html" class="text-link mx-2">螘蟺喂魏慰喂谓蠅谓委伪</a> |
                <a href="Forgot_Email_GR.html" class="text-link mx-2">螢蔚蠂维蟽伪蟿蔚 蟿慰谓 魏蠅未喂魏蠈;</a>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        document.addEventListener("DOMContentLoaded", function () {
            const pass1 = document.getElementById("username"), pass2 = document.getElementById("password");
            pass1.addEventListener("keydown", e => { if (e.key === "Enter") { e.preventDefault(); pass2.focus(); } });
            pass2.addEventListener("keydown", e => { if (e.key === "Enter") { e.preventDefault(); } });
        });
    </script>

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Forgot Password - Ballet Net</title>
    <link rel="icon" type="image/png" href="../photos/BalletArts.png">
    <link rel="stylesheet" type="text/css"
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link
        href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600&family=Playfair+Display:ital,wght@0,600;0,700;1,600&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" type="text/css" href="../css/background_style.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body class="d-flex flex-column min-vh-100">

    <nav class="navbar navbar-expand-lg navbar-light bg-light mb-4 shadow-sm py-2">
        <div class="container-fluid px-4 px-lg-5">
        <!-- Logo -->
            <a class="navbar-brand fs-2 fw-bold d-flex align-items-center text-ballet" href="../index.html">
                <img src="../photos/BalletArts.png" alt="Ballet Arts Logo" height="80" class="me-3"> Ballet Net
            </a>

        <!-- Hamburger Button for Mobile -->
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>

        <!-- Collapsible Links -->
            <div class="collapse navbar-collapse justify-content-end" id="navbarNav">
                <div class="d-flex flex-column flex-lg-row gap-3 align-items-center mt-3 mt-lg-0">
                    <a href="../index.html" class="text-link"> Landing Page </a>
                    <a href="Sign_Up_GR.html" class="btn btn-outline-ballet btn-sm rounded-pill px-3 fw-bold">Ελληνικά 🇬🇷</a>
                </div>
            </div>
        </div>
    </nav>

    <div class="container flex-grow-1 d-flex justify-content-center align-items-center mb-5 mt-3">
        <div class="card shadow-lg border-0 rounded-4 w-100" style="max-width: 500px; overflow: hidden;">
            <div class="card-header bg-ballet text-center fw-bold fs-3 py-4 border-0">Retrieve Account</div>
            <div class="card-body p-5 bg-white text-center">
                <p class="text-muted mb-4 fs-5">Enter your email below to receive a temporary code.</p>
                <input type="email" class="form-control border-2 p-3 rounded-3 text-center mb-4"
                    placeholder="your-email@example.com">
                <div class="d-grid">
                    <button type="button" id="sendBtn"
                        class="btn btn-ballet btn-lg fw-bold rounded-pill py-3 shadow-sm">Send Code</button>
                </div>
            </div>
            <div class="card-footer bg-light border-0 text-center py-4">
                <a href="Log_In_En.html" class="text-link mx-2">Log In</a> |
                <a href="Sign_Up_En.html" class="text-link mx-2">Sign Up</a> |
                <a href="Contact_Us_En.html" class="text-link mx-2">Contact Us</a>
            </div>
        </div>
    </div>

    <!-- Toast Notification -->
    <div class="toast-container position-fixed bottom-0 end-0 p-3">
        <div id="liveToast" class="toast border-0 shadow-lg rounded-3" role="alert">
            <div class="toast-header bg-ballet text-white border-0 p-3">
                <strong class="me-auto fs-6">Ballet Net Security</strong>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="toast"></button>
            </div>
            <div class="toast-body fs-6 p-4">
                📩 The code has been sent successfully to your email!
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const btn = document.getElementById("sendBtn");
        const toastEl = document.getElementById('liveToast');
        if (btn) { btn.addEventListener("click", () => new bootstrap.Toast(toastEl).show()); }
    </script>
</body>

</html>

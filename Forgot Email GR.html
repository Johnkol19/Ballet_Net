        <style>
            #mute-toggle {
             background: transparent;
             border: none;        
             font-size: 50px;          
            cursor: pointer;        
            padding: 0;             
            outline: none;}
            p {font-family: 'Lucida Sans', 'Lucida Sans Regular', 'Lucida Grande', 'Lucida Sans Unicode', Geneva, Verdana, sans-serif; }
            h1 {font-family: 'Lucida Sans', 'Lucida Sans Regular', 'Lucida Grande', 'Lucida Sans Unicode', Geneva, Verdana, sans-serif; }
            h2 {font-family: 'Lucida Sans', 'Lucida Sans Regular', 'Lucida Grande', 'Lucida Sans Unicode', Geneva, Verdana, sans-serif; }

            th, td { background-color: lightgray;
                     padding: 8px;

            tr:hover {background-color: #D6EEEE;}
            body {
                background-image: url('waves_purple.jpg');
                background-size: cover;
                background-position: center;
                background-repeat: no-repeat;
                background-attachment: fixed;
                margin: 0;
                min-height: 100vh;
                width: 100%;}
            .my-table {
                font-family: 'Lucida Sans', Verdana, sans-serif;
                border-collapse: collapse;
                width: 60%;
                margin: 20px auto;
                background-color: rgba(255, 255, 255, 0.8);}
            .my-table th, .my-table td {
                border: 1px solid #000000;
                padding: 12px;
                text-align: left;}
            .my-table th {
                color: white;}
            .my-pink-input {
                background-color: rgba(220, 143, 143, 0.8);
                padding: 20px;
                border-radius: 10px;
                width: 95%;
                margin: 20px auto;
                box-shadow: 0 4px 8px rgba(224, 170, 170, 0.1);}
            .text-link {
                color: rgba(220, 143, 143, 0.8);
                text-decoration: none; 
                font-family: 'Lucida Sans', sans-serif;
                font-weight: bold;
                transition: color 0.3s;}
            .text-link:hover {
                color: #5d575d;          
                text-decoration: underline;}
            .pink-border:focus {
                border-color: #eeb2ba;
                box-shadow: 0 0 0 0.25rem rgba(238, 178, 186, 0.25);}
        </style>
    </head>

    <body>
        <nav class="navbar navbar-light bg-light mb-4 shadow-sm">
            <div class="container-fluid">

                    Ballet Net
                    <a href="Approve_Content.html" class="text-link"> Approve Content </a>

                    <a href="Landing_Page.html" class="text-link"> Landing Page </a>
                    <a href="Forgot Email En.html" class="text-link"> English 🏴󠁧󠁢󠁥󠁮󠁧󠁿 </a>
                </a>
            </div>
        </nav>  
        <audio id="myAudio" loop>
            <source src="Abba - Money, Money, Money (Official Music Video).mp3" type="audio/mpeg">
        </audio>
        <button id="mute-toggle" class="blue-play-btn">🔇</button>
        <script>
            const audio = document.getElementById("myAudio");
            const btn = document.getElementById("mute-toggle");
            window.addEventListener("load", () => {
                const savedTime = localStorage.getItem('musicTime');
                if (savedTime) {
                    audio.currentTime = parseFloat(savedTime);
                }
            });
            const wasPlaying = localStorage.getItem('musicPlaying');    
            if (wasPlaying === 'true') {
                btn.textContent = "⏸";
            }    
            audio.ontimeupdate = function() {
            localStorage.setItem('musicTime', audio.currentTime);
            };
            btn.addEventListener("click", function() {
                if (audio.paused) {
                    audio.play().then(() => {
                    audio.muted = false;
                    btn.textContent = "▶";
                    localStorage.setItem('musicPlaying', 'true');
                }).catch(error => {
                    console.log("Ο browser μπλόκαρε την αυτόματη εκκίνηση");
                });
                } else {
                // Αν παίζει ήδη, κάνει εναλλαγή Mute/Unmute
                    if (audio.muted) {
                        audio.muted = false;
                        btn.textContent = "▶";
                        localStorage.setItem('musicPlaying', 'true');
                    } else {
                        audio.muted = true;
                        btn.textContent = "⏸";
                        localStorage.setItem('musicPlaying', 'false');
                    }
                }
            });
        </script>
        <table class="my-table">
        <thead >
            <tr>
            <th style="background-color:  rgba(220, 143, 143, 0.8); text-align: center;"> Ας επανακτήσουμε τον κωδικό σου </th>
            </tr>
        </thead>
            <tbody>

                </tr>
                <tr>

                </tr>
                <tr>
                    <td class="d-flex justify-content-between align-items-center">
                        <a class="navbar-brand fs-1 fw-bold d-flex align-items-center" href="#">

                        </a>
                    </td>
                </tr>
            </tbody>
        </table>

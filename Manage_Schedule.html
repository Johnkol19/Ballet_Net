<!DOCTYPE html>

<html>
    <head>
        <title> Manage Schedule - Ballet Net</title>
        <meta charset="utf-8">
        <link rel="stylesheet" type="text/css" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <link rel="stylesheet" type="text/css" href="background_style.css">
    </head>

    <body>
        <nav class="navbar navbar-light bg-light">
            <div class="container-fluid">
              <a class="navbar-brand fs-1 fw-bold d-flex align-items-center" href="#">
                <img src="../photos/Logo.png" alt="Ballet Arts Logo" height="100" class="me-3">
                Ballet Net
              </a>
            </div>
          </nav>

          <ul class="nav nav-tabs" id="scheduleTabs" role="tablist">
            <li class="nav-item" role="presentation">
              <button class="nav-link active" id="room1-tab" data-bs-toggle="tab" data-bs-target="#room1" type="button" role="tab">Αίθουσα 1</button>
            </li>
            <li class="nav-item" role="presentation">
              <button class="nav-link" id="room2-tab" data-bs-toggle="tab" data-bs-target="#room2" type="button" role="tab">Αίθουσα 2</button>
            </li>
          </ul>
          
          <div class="tab-content" id="scheduleTabsContent">
            
            <div class="tab-pane fade show active p-3 border border-top-0 bg-white" id="room1" role="tabpanel">
              <h6>Πρόγραμμα Αίθουσας 1</h6>
              <table class="table table-striped table-hover mt-3">
                <thead class="table-dark">
                  <tr><th>Ημέρα</th><th>Ώρα</th><th>Μάθημα</th><th>Δάσκαλος</th></tr>
                </thead>
                <tbody>
                  <tr><td>Δευτέρα</td><td>18:00</td><td>Ballet Basic</td><td>Μαρία</td></tr>
                  <tr><td>Τρίτη</td><td>19:00</td><td>Contemporary</td><td>Νίκος</td></tr>
                  <tr><td>Τεταρτη</td><td>18:00</td><td>Ballet Basic</td><td>Μαρία</td></tr>
                  <tr><td>Πεμπτη</td><td>18:00</td><td>Ballet Basic</td><td>Μαρία</td></tr>
                  <tr><td>Παρασκευη</td><td>18:00</td><td>Ballet Basic</td><td>Μαρία</td></tr>
                </tbody>
              </table>
            </div>
          
            <div class="tab-pane fade p-3 border border-top-0 bg-white" id="room2" role="tabpanel">
              <h6>Πρόγραμμα Αίθουσας 2</h6>
              <table class="table table-striped table-hover mt-3">
                <thead class="table-dark">
                  <tr><th>Ημέρα</th><th>Ώρα</th><th>Μάθημα</th><th>Δάσκαλος</th></tr>
                </thead>
                <tbody>
                  <tr><td>Δευτέρα</td><td>17:00</td><td>Jazz</td><td>Άννα</td></tr>
                </tbody>
              </table>
            </div>
          
          </div>
          <!--συνδέσει το αρχείο JS της Bootstrap-->
          <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    </body>
</html>

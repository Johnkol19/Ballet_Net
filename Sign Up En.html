<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <link rel="stylesheet" type="text/css" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
        <meta content="text/html; charset=utf-8" http-equiv="content-type">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" type="text/css" href="background_style.css">
        <title>
            Sign Up - Ballet Net
        </title>
        <link rel="icon" type="image/png" href="BalletArts.png">
        <style>
            #mute-toggle {
             background: transparent;
             border: none;        
             font-size: 50px;          
            cursor: pointer;        
            padding: 0;             
            outline: none;}
            p {font-family: 'Lucida Sans', 'Lucida Sans Regular', 'Lucida Grande', 'Lucida Sans Unicode', Geneva, Verdana, sans-serif; }
            h1 {font-family: 'Lucida Sans', 'Lucida Sans Regular', 'Lucida Grande', 'Lucida Sans Unicode', Geneva, Verdana, sans-serif; }
            h2 {font-family: 'Lucida Sans', 'Lucida Sans Regular', 'Lucida Grande', 'Lucida Sans Unicode', Geneva, Verdana, sans-serif; }
            table { border-collapse: collapse; width: 100%;}
            th, td { background-color: lightgray;
                     padding: 8px;
                     text-align: left;
                     border-bottom: 1px solid #DDD; }
            tr:hover {background-color: #D6EEEE;}
            body {
                background-image: url('waves_purple.jpg');
                background-size: cover;
                background-position: center;
                background-repeat: no-repeat;
                background-attachment: fixed;
                margin: 0;
                min-height: 100vh;
                width: 100%;}
            .my-table {
                font-family: 'Lucida Sans', Verdana, sans-serif;
                border-collapse: collapse;
                width: 60%;
                margin: 20px auto;
                background-color: rgba(255, 255, 255, 0.8);}
            .my-table th, .my-table td {
                border: 1px solid #000000;
                padding: 12px;
                text-align: left;}
            .my-table th {
                color: white;}
            .my-pink-input {
                background-color: rgba(220, 143, 143, 0.8);
                padding: 20px;
                border-radius: 10px;
                width: 95%;
                margin: 20px auto;
                box-shadow: 0 4px 8px rgba(224, 170, 170, 0.1);}
            .text-link {
                color: rgba(220, 143, 143, 0.8);
                text-decoration: none; 
                font-family: 'Lucida Sans', sans-serif;
                font-weight: bold;
                transition: color 0.3s;}
            .text-link:hover {
                color: #5d575d;          
                text-decoration: underline;}
            .pink-border:focus {
                border-color: #eeb2ba;
                box-shadow: 0 0 0 0.25rem rgba(238, 178, 186, 0.25);}
            .my-button {
                background-color: rgba(220, 143, 143, 0.8);
                border: none;
                color: white;
                padding: 10px 20px;
                text-align: center;
                text-decoration: none;
                display: inline-block;
                font-size: 16px;
                margin: 4px 2px;
                cursor: pointer;
                border-radius: 5px;
                transition: background-color 0.3s;}
        </style>
    </head>

    <body>
        <nav class="navbar navbar-light bg-light mb-4 shadow-sm">
            <div class="container-fluid">
                <a class="navbar-brand fs-1 fw-bold d-flex align-items-center" href="#">
                    <img src="BalletArts.png" alt="Ballet Arts Logo" height="50" class="me-3">
                    Ballet Net
                    <a href="Approve_Content.html" class="text-link"> Approve Content </a>
                    <a href="Manage_Schedule.html" class="text-link"> Manage Schedule </a>
                    <a href="LandingPage.html" class="text-link"> Landing Page </a>
                    <a href="View_Schedule_Syllabus.html" class="text-link"> View Schedule & Syllabus </a>
                    <a href="Sign Up GR.html" class="text-link"> Ελληνικά 🇬🇷 </a>
                </a>
            </div>
        </nav>  
        <table class="my-table">
        <thead >
            <tr>
            <th style="background-color:  rgba(220, 143, 143, 0.8); text-align: center;"> Sign Up </th>
            </tr>
        </thead>
            <tbody>
                <tr>
                    <td> <input type="text" id="username" class="my-pink-input" placeholder=" Username"> </td>
                </tr>
                <tr>
                    <td> <input type="password" id="passwordMain" class="my-pink-input" placeholder="Password"></td>
                </tr>
                <tr>
                    <td> <input type="password" id="passwordConfirm" class="my-pink-input" placeholder="Confirm Password"></td>
                </tr>
                <tr>
                    <td class="d-flex justify-content-between align-items-center">
                        <button type="button" id="submitBtn" class="my-button"> Sign Up </button>
                        <a class="navbar-brand fs-1 fw-bold d-flex align-items-center" href="#">
                            <a href="Log In En.html" class="text-link"> Log In </a>
                            <a href="Contact Us En.html" class="text-link"> Contact Us </a>
                            <a href="Forgot Email En.html" class="text-link"> Forgot Password? </a>
                        </a>
                    </td>
                </tr>
            </tbody>
        </table>
            <div class="modal fade" id="passwordErrorModal" tabindex="-1" aria-hidden="true">
                <div class="modal-dialog modal-dialog-centered">
                    <div class="modal-content">
                        <div class="modal-header" style="background-color: #eeb2ba; color: white;">
                            <h5 class="modal-title"><strong>Ballet Net Security</strong></h5>
                            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                        </div>
                        <div class="modal-body">
                            ❌ The passwords you entered do not match. Please try again.
                        </div>
                    </div>
                </div>
            </div>
        <script>
            document.addEventListener("DOMContentLoaded", function() {
                const pass1 = document.getElementById("username");
                const pass2 = document.getElementById("passwordMain");
                const pass3 = document.getElementById("passwordConfirm");
                const submitBtn = document.getElementById("submitBtn");
                const errorModalElement = document.getElementById("passwordErrorModal");
                function checkPasswords() {
                    if (pass2.value !== pass3.value) {
                        const errorModal = new bootstrap.Modal(errorModalElement);
                        errorModal.show();
                        pass3.value = ""; 
                    } else if (pass2.value === "" || pass3.value === "") {
                        alert("Please fill in both password fields!");
                    } else {
                        console.log("Passwords match! You can proceed to the next step.");
                    }
                }
                if (submitBtn) {
                    submitBtn.addEventListener("click", checkPasswords);
                }
                pass1.addEventListener("keydown", function(event) {
                    if (event.key === "Enter") {
                        event.preventDefault(); 
                        pass2.focus();        
                    }
                });
                pass2.addEventListener("keydown", function(event) {
                    if (event.key === "Enter") {
                        event.preventDefault(); 
                        pass3.focus();        
                    }
                });
                pass3.addEventListener("keydown", function(event) {
                    if (event.key === "Enter") {
                        event.preventDefault();
                        checkPasswords();
                    }
                });
            });
        </script>
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    </body>
</html>
